<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — $lipCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Thai', 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c1628;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: transparent;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .login-header {
      background: linear-gradient(160deg, #0f1f3d 0%, #162848 100%);
      padding: 36px 32px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px 16px 0 0;
    }

    .login-header .brand-icon {
      font-size: 38px;
      color: #3b82f6;
      display: block;
      margin-bottom: 12px;
    }

    .login-header h1 {
      margin: 0 0 6px;
      font-size: 21px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.2px;
    }

    .login-header p {
      margin: 0;
      font-size: 12px;
      color: #475569;
      font-weight: 500;
    }

    .login-body {
      padding: 30px 32px 32px;
      background: #ffffff;
      border-radius: 0 0 16px 16px;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-field label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
      letter-spacing: 0.1px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #94a3b8;
      pointer-events: none;
    }

    .form-field input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      outline: none;
      appearance: none;
    }

    .form-field input:focus {
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .toggle-password {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 15px;
      padding: 2px 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .toggle-password:hover {
      color: #475569;
    }

    .alert-message {
      display: none;
      font-size: 12.5px;
      font-weight: 500;
      color: #dc2626;
      background: rgba(239, 68, 68, 0.07);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      margin-top: 6px;
      letter-spacing: 0.1px;
    }

    .btn-login:hover {
      background: #2563eb;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
    }

    .btn-login:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <i class="bi bi-shield-check brand-icon"></i>
        <h1>SlipCheck</h1>
        <p>ระบบตรวจสลิปอัตโนมัติ</p>
      </div>
      <div class="login-body">
        <form action="/login" method="post">
          <div id="alertMessage" class="alert-message"></div>

          <div class="form-field">
            <label for="username">ชื่อผู้ใช้</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input type="text" id="username" name="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username" required>
            </div>
          </div>

          <div class="form-field">
            <label for="password">รหัสผ่าน</label>
            <div class="input-wrapper">
              <i class="bi bi-lock input-icon"></i>
              <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password" required>
              <button type="button" class="toggle-password" onclick="togglePassword()">
                <i class="bi bi-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function showAlertMessage(message) {
      const alertDiv = document.getElementById("alertMessage")
      alertDiv.innerText = message
      alertDiv.style.display = "block"
      setTimeout(() => { alertDiv.style.display = "none" }, 3000)
    }

    window.onload = function() {
      const params = new URLSearchParams(window.location.search)
      if (params.has("error")) showAlertMessage("ชื่อผู้ใช้ หรือรหัสผ่าน ไม่ถูกต้อง")
    }

    function togglePassword() {
      const input = document.getElementById("password")
      const icon = document.getElementById("eye-icon")
      if (input.type === "password") {
        input.type = "text"
        icon.className = "bi bi-eye-slash"
      } else {
        input.type = "password"
        icon.className = "bi bi-eye"
      }
    }
  </script>
</body>
</html>
